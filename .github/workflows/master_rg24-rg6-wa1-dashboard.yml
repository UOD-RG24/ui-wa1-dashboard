name: Build and deploy Node.js app to Azure Web App - rg24-rg6-wa1-dashboard

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: rg24-rg6-wa1-dashboard-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend
          npm ci --prefix backend

      - name: Build application
        run: |
          npm run build --prefix frontend
          npm run build --prefix backend

      - name: Run tests
        run: npm run test --if-present

      - name: Prepare production dependencies
        run: |
          rm -rf node_modules frontend/node_modules backend/node_modules
          npm ci --omit=dev --prefix frontend
          npm ci --omit=dev --prefix backend

      - name: Remove unnecessary files
        run: |
          rm -rf frontend/.next/cache
          rm -rf .git
          rm -rf .github
          rm -rf .vs
          rm -rf coverage
          find . -type f -name "*.log" -delete

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .
            !.git/**
            !.github/**
            !.vs/**
            !frontend/.next/cache/**
            !coverage/**
            !**/*.log
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: rg24-rg6-wa1-dashboard
          slot-name: Production
          package: deploy
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E369C23060DC407CB81CF489E82BE379 }}
