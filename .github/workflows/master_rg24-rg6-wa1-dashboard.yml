name: Build and deploy Node.js app to Azure Web App - rg24-rg6-wa1-dashboard

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: rg24-rg6-wa1-dashboard-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend
          npm ci --prefix backend

      - name: Build application
        run: |
          npm run build --prefix frontend
          npm run build --prefix backend

      - name: Run tests
        run: npm run test --if-present

      - name: Prepare production frontend dependencies
        run: |
          rm -rf frontend/node_modules
          npm ci --omit=dev --prefix frontend

      - name: Create lean deployment zip
        run: |
          mkdir -p deploy-package/frontend
          # Runtime package.json has NO build script so Oryx cannot rebuild on Azure
          printf '%s\n' \
            '{' \
            '  "name": "ui-wa1-dashbaord",' \
            '  "version": "1.0.0",' \
            '  "private": true,' \
            '  "scripts": {' \
            '    "start": "npm run start --prefix frontend"' \
            '  }' \
            '}' > deploy-package/package.json
          printf '%s\n' \
            '[config]' \
            'SCM_DO_BUILD_DURING_DEPLOYMENT = false' > deploy-package/.deployment
          cp frontend/package.json frontend/package-lock.json frontend/next.config.ts deploy-package/frontend/
          cp -r frontend/.next frontend/public frontend/node_modules deploy-package/frontend/
          if [ -f frontend/next-env.d.ts ]; then cp frontend/next-env.d.ts deploy-package/frontend/; fi
          cd deploy-package
          zip -r ../deploy.zip . -q
          cd ..
          ls -lh deploy.zip
          echo "--- package.json in zip ---"
          unzip -p deploy.zip package.json
          echo "--- zip contents (top) ---"
          unzip -l deploy.zip | head -n 40

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Disable Oryx and free App Service disk
        shell: bash
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E369C23060DC407CB81CF489E82BE379 }}
        run: |
          set -euo pipefail
          USERNAME=$(printf '%s' "$PUBLISH_PROFILE" | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -n 1)
          PASSWORD=$(printf '%s' "$PUBLISH_PROFILE" | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -n 1)
          if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "Could not parse publish profile credentials"
            exit 1
          fi
          SCM="https://rg24-rg6-wa1-dashboard.scm.azurewebsites.net"

          # OneDeploy ignores .deployment alone — set SCM settings via Kudu
          curl --fail --silent --show-error \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/json" \
            -X POST \
            "$SCM/api/settings" \
            -d '{"SCM_DO_BUILD_DURING_DEPLOYMENT":"false","ENABLE_ORYX_BUILD":"false"}'
          echo
          echo "Remote build disabled."

          # Previous failed Oryx builds leave /home/site/wwwroot full (rsync broken pipe / ENOSPC)
          curl --fail --silent --show-error \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/json" \
            -X POST \
            "$SCM/api/command" \
            -d '{"command":"bash -lc \"rm -rf /home/site/wwwroot/* /tmp/zipdeploy /tmp/oryx /tmp/8dee* 2>/dev/null || true; df -h /home\"","dir":"/home"}'
          echo
          echo "App Service disk cleaned."

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: rg24-rg6-wa1-dashboard
          slot-name: Production
          package: deploy.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E369C23060DC407CB81CF489E82BE379 }}
